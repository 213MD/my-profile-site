<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>계산기</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .calculator {
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      width: 300px;
      padding: 20px;
    }

    .display {
      background: #2d3436;
      color: #00ff00;
      font-size: 2em;
      padding: 20px;
      border-radius: 5px;
      text-align: right;
      margin-bottom: 20px;
      min-height: 60px;
      font-family: 'Courier New', monospace;
      word-break: break-all;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    button {
      padding: 20px;
      font-size: 1.2em;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
    }

    button:active {
      transform: scale(0.95);
    }

    .number {
      background: #ecf0f1;
      color: #2d3436;
    }

    .number:hover {
      background: #bdc3c7;
    }

    .operator {
      background: #667eea;
      color: white;
    }

    .operator:hover {
      background: #5568d3;
    }

    .equals {
      background: #27ae60;
      color: white;
      grid-column: span 2;
    }

    .equals:hover {
      background: #229954;
    }

    .clear {
      background: #e74c3c;
      color: white;
      grid-column: span 2;
    }

    .clear:hover {
      background: #c0392b;
    }

    /* 과학 함수 버튼 스타일 */
    .science {
      background: #9b59b6;
      color: white;
      font-size: 0.9em;
    }

    .science:hover {
      background: #8e44ad;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display" id="display">0</div>
    <div class="buttons">
      <!-- 과학 함수 행 -->
      <button class="science" onclick="applyScienceFunction('log')">log</button>
      <button class="science" onclick="applyScienceFunction('ln')">ln</button>
      <button class="science" onclick="applyScienceFunction('sqrt')">√</button>
      <button class="science" onclick="applyScienceFunction('pow')">x²</button>
      <button class="clear" onclick="clearDisplay()">C</button>

      <!-- 숫자 행 1 -->
      <button class="number" onclick="appendNumber('7')">7</button>
      <button class="number" onclick="appendNumber('8')">8</button>
      <button class="number" onclick="appendNumber('9')">9</button>
      <button class="operator" onclick="appendOperator('+')">+</button>
      <button class="operator" onclick="appendOperator('/')">÷</button>

      <!-- 숫자 행 2 -->
      <button class="number" onclick="appendNumber('4')">4</button>
      <button class="number" onclick="appendNumber('5')">5</button>
      <button class="number" onclick="appendNumber('6')">6</button>
      <button class="operator" onclick="appendOperator('-')">−</button>
      <button class="operator" onclick="appendOperator('*')">×</button>

      <!-- 숫자 행 3 -->
      <button class="number" onclick="appendNumber('1')">1</button>
      <button class="number" onclick="appendNumber('2')">2</button>
      <button class="number" onclick="appendNumber('3')">3</button>
      <button class="number" onclick="appendNumber('.')">.</button>
      <button class="equals" onclick="calculate()" style="grid-row: span 2;">=</button>

      <!-- 숫자 행 4 -->
      <button class="number" onclick="appendNumber('0')" style="grid-column: span 2;">0</button>
      <button class="science" onclick="applyScienceFunction('percent')">%</button>
      <button class="science" onclick="applyScienceFunction('invert')">1/x</button>
    </div>
  </div>

  <script>
    let display = document.getElementById('display');
    let currentValue = '0';
    let previousValue = '';
    let operation = null;
    let shouldResetDisplay = false;

    function updateDisplay() {
      display.textContent = currentValue;
    }

    function appendNumber(num) {
      if (shouldResetDisplay) {
        currentValue = num;
        shouldResetDisplay = false;
      } else {
        if (currentValue === '0' && num !== '.') {
          currentValue = num;
        } else if (num === '.' && currentValue.includes('.')) {
          return;
        } else {
          currentValue += num;
        }
      }
      updateDisplay();
    }

    function appendOperator(op) {
      if (operation !== null) {
        calculate();
      }
      previousValue = currentValue;
      operation = op;
      shouldResetDisplay = true;
    }

    function calculate() {
      if (operation === null || shouldResetDisplay) return;

      const prev = parseFloat(previousValue);
      const current = parseFloat(currentValue);
      let result;

      switch (operation) {
        case '+':
          result = prev + current;
          break;
        case '-':
          result = prev - current;
          break;
        case '*':
          result = prev * current;
          break;
        case '/':
          result = current !== 0 ? prev / current : 0;
          break;
        default:
          return;
      }

      currentValue = String(result);
      operation = null;
      shouldResetDisplay = true;
      updateDisplay();
    }

    function clearDisplay() {
      currentValue = '0';
      previousValue = '';
      operation = null;
      shouldResetDisplay = false;
      updateDisplay();
    }

    // 과학 함수 처리 (단항 연산자)
    function applyScienceFunction(func) {
      const num = parseFloat(currentValue);
      let result;

      switch (func) {
        case 'log':
          // 상용 로그 (밑이 10)
          result = Math.log10(num);
          break;
        case 'ln':
          // 자연 로그 (밑이 e)
          result = Math.log(num);
          break;
        case 'sqrt':
          // 제곱근
          result = Math.sqrt(num);
          break;
        case 'pow':
          // 제곱
          result = num * num;
          break;
        case 'percent':
          // 백분율
          result = num / 100;
          break;
        case 'invert':
          // 역수 (1/x)
          result = num !== 0 ? 1 / num : 0;
          break;
        default:
          return;
      }

      currentValue = String(result);
      operation = null;
      shouldResetDisplay = true;
      updateDisplay();
    }

    updateDisplay();
  </script>
</body>
</html>
